# Top-level absim configuration.
# Selectable groups: experiment, data, criterion. Override on the CLI:
#
#   absim run experiment=continuous_welch_vs_cuped
#   absim run experiment=ratio_delta_vs_linearization data.n_per_group=2000
#
defaults:
  - experiment: continuous_welch_vs_cuped
  - _self_

simulator:
  n_sims: 10000
  alpha: 0.05
  seed: 0
  n_jobs: -1
  parallel: true

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  output_subdir: hydra
  job:
    chdir: false
